<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        .dpad {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .button {
            width: 50px;
            height: 50px;
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Gameplay Controls</h1>
    <div class="dpad">
        <button class="button" onclick="move('up')">↑</button>
        <div>
            <button class="button" onclick="move('left')">←</button>
            <button class="button" onclick="move('right')">→</button>
        </div>
        <button class="button" onclick="move('down')">↓</button>
    </div>
    <script>
        function move(direction) {
            // Implement the movement logic here
            console.log('Moving', direction);
        }
    </script>
</body>
</html>
